<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIR Library</title>
  <link rel="shortcut icon" href="/images/air-icon.png" type="image/png">
</head>

<body>
  <header>
    <div id="logo-header-container">
      <img src="/images/air_logo.png" alt="logo header" id="logo-header">
    </div>

    <button id="menu-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#e3e3e3">
        <path d="M0 0h24v24H0z" fill="none" />
        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
      </svg>
    </button>

    <nav>
      <ul id="nav-list">
        <li class="nav-item current-page" data-route="library">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#e3e3e3">
            <path d="M0 0h24v24H0z" fill="none" />
            <path
              d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z" />
          </svg>
          Library
        </li>

        <li class="nav-item" data-route="users">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#e3e3e3">
            <path d="M0 0h24v24H0z" fill="none" />
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
          </svg>
          </svg>
          Users
        </li>
      </ul>
    </nav>
  </header>

  <main></main>

  <template id="title-template">
    <h1></h1>
  </template>

  <template id="modal-template">
    <dialog class="modal">
      <div class="modal-content">
        <h1></h1>
        <p></p>
        <div class="modal-buttons">
          <button class="confirm-btn">Confirm</button>
          <button class="cancel-btn">Cancel</button>
        </div>
      </div>
    </dialog>
  </template>

  <template id="toolbar-template">
    <section id="toolbar">
      <form>
        <fieldset>
          <p>
            <label for="search">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#e3e3e3">
                <path d="M0 0h24v24H0V0z" fill="none" />
                <path
                  d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
              </svg>
            </label>
            <input type="text" name="search" id="search" placeholder="Start searching...">
          </p>
        </fieldset>
        <fieldset id="filter-status">
          <p>
            <label for="available">Available</label>
            <input type="checkbox" name="available" id="filter-available" checked>
          </p>
          <p>
            <label for="loaned">Loaned</label>
            <input type="checkbox" name="loaned" id="filter-loaned" checked>
          </p>
        </fieldset>
      </form>
      <button id="add-btn">+</button>
    </section>
  </template>

  <template id="books-template">
    <section id="books">
      <p class="load-message">Loading...</p>
    </section>
  </template>

  <template id="book-template">
    <article class="book">
      <div class="book-img-container">
        <img src="/images/book.png" alt="book image">

        <div class="books-actions">
          <button class="giveback-book-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#e3e3e3">
              <path
                d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z" />
            </svg>
          </button>
          <button class="loan-book-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#e3e3e3">
              <path
                d="M280-80q-33 0-56.5-23.5T200-160q0-33 23.5-56.5T280-240q33 0 56.5 23.5T360-160q0 33-23.5 56.5T280-80Zm400 0q-33 0-56.5-23.5T600-160q0-33 23.5-56.5T680-240q33 0 56.5 23.5T760-160q0 33-23.5 56.5T680-80ZM208-800h590q23 0 35 20.5t1 41.5L692-482q-11 20-29.5 31T622-440H324l-44 80h480v80H280q-45 0-68-39.5t-2-78.5l54-98-144-304H40v-80h130l38 80Z" />
            </svg>
          </button>
          <button class="edit-book-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#e3e3e3">
              <path
                d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z" />
            </svg>
          </button>
          <button class="delete-book-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#e3e3e3">
              <path
                d="m376-300 104-104 104 104 56-56-104-104 104-104-56-56-104 104-104-104-56 56 104 104-104 104 56 56Zm-96 180q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520Zm-400 0v520-520Z" />
            </svg>
          </button>
        </div>
      </div>
      <h2 class="book-title">Book Title</h2>
      <p>By <span class="book-author">Author</span> (<span class="book-year">2025</span>)</p>
      <p class="book-status">LOANED</p>
    </article>
  </template>

  <template id="book-form-template">
    <section id="book-form" class="form">
      <form>
        <img src="/images/book.png" alt="book image">
        <h1>Book Form</h1>
        <input type="text" name="book-title" id="book-title" placeholder="Title">
        <input type="text" name="book-author" id="book-author" placeholder="Author">
        <input type="number" name="book-year" id="book-year" placeholder="Publication year">
        <button type="submit">Save</button>
      </form>
    </section>
  </template>

  <template id="users-template">
    <section id="users">
      <p class="load-message">Loading...</p>
    </section>
  </template>

  <template id="user-template">
    <article class="user">
      <img src="/images/user.png" alt="user image">
      <div class="user-info">
        <p class="username">User</p>
        <button class="user-loans-btn">See loans</button> <br>
        <button class="edit-user-btn">Update</button>
        <button class="delete-user-btn">Delete</button>
      </div>
    </article>
  </template>

  <template id="user-form-template">
    <section id="user-form" class="form">
      <form>
        <img src="/images/user.png" alt="user image">
        <h1>User Form</h1>
        <input type="text" name="username" id="username" placeholder="Name">
        <button type="submit">Save</button>
      </form>
    </section>
  </template>

  <template id="loan-form-template">
    <section id="loan-form" class="form">
      <form>
        <h1>Take out loan</h1>
        <p class="input-container">
          <label for="user">User:</label>
          <select name="user" id="user">
          </select>
        </p>
        <button type="submit">Loan</button>
      </form>
    </section>
  </template>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
